description: |
  Website hiển thị một QR code dùng cho việc bàn giao token nội bộ. Khi quét QR, người chơi chỉ nhận được phần đầu của flag.
  Tuy nhiên asset web còn có một lớp dữ liệu mờ nằm chồng lên QR.
hints:
  - QR scan chỉ là lớp nhìn thấy được.
  - DevTools có thể nhìn thấy nhiều lớp hơn camera.
  - Màu gần như đen đôi khi vẫn khác nhau ở bit thấp nhất.
